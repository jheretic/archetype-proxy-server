# nginx reverse proxy with COOKIE-BASED sticky upstreams for
# archetype-proxy-server multi-replica deployment.
#
# Provided as an ALTERNATIVE to the primary HAProxy config
# (../haproxy/haproxy.cfg). The smoke harness uses HAProxy because its
# `cookie insert indirect` is the correct cookie->server primitive on OSS
# software; nginx's clean equivalent is the `sticky cookie` directive, which is
# an **NGINX Plus** (or the 3rd-party nginx-sticky-module) feature.
#
# === RECOMMENDED (NGINX Plus / sticky-module): native sticky cookie ===
# `sticky cookie` sets the affinity cookie on the first response and routes by
# it automatically — the direct analogue of HAProxy's `cookie insert indirect`:
#
#     upstream archetype_replicas {
#         server replica1:8443;
#         server replica2:8443;
#         sticky cookie APROXYID expires=1h path=/ httponly;
#     }
#
# === STOCK OSS nginx fallback: cookie-keyed consistent hash ===
# Stock nginx has no directive that sets-and-reads a server-naming cookie. The
# closest stock primitive is to (a) set a cookie ourselves that names the
# chosen replica and (b) `hash` by that cookie. CAVEAT: `hash $cookie consistent`
# maps the cookie VALUE through nginx's hash ring, which is NOT guaranteed to
# resolve to the very replica the value names — it only guarantees the SAME
# value always lands on the SAME replica. That is sufficient for stickiness
# (a given session's follow-ups are consistent) as long as the cookie is set
# AFTER nginx has chosen the handshake replica, so the value is stable from the
# handshake onward. We set APROXYID to a per-request-stable token on the
# /attest response and hash by it thereafter. Residual misses are covered by
# the client's #19 re-handshake. For a STRICT guarantee, use HAProxy or NGINX
# Plus.

worker_processes auto;
events { worker_connections 1024; }

http {
    # Routing key: the affinity cookie if present, else the client address so
    # the cookie-less handshake still spreads across replicas.
    map $cookie_APROXYID $route {
        default $cookie_APROXYID;
        ""      $remote_addr;
    }

    upstream archetype_replicas {
        hash $route consistent;
        server replica1:8443;
        server replica2:8443;
        # NGINX Plus / sticky-module: replace the `hash` line above with:
        # sticky cookie APROXYID expires=1h path=/ httponly;
    }

    # WebSocket Upgrade plumbing.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;

        # Set a STABLE affinity cookie on the handshake response. Using
        # $request_id (unique per request, but the client only handshakes once
        # per session and then reuses the cookie) keeps a session pinned.
        location = /attest {
            proxy_pass http://archetype_replicas;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Set-Cookie "APROXYID=$request_id; Path=/; HttpOnly" always;
        }

        # Unauthenticated health probes: route only to ready replicas. (Stock
        # nginx OSS has no active upstream health check; use Plus's
        # `health_check` or rely on the orchestrator's /readyz probe to pull a
        # NotReady replica out of DNS.)
        location = /readyz  { proxy_pass http://archetype_replicas; }
        location = /healthz { proxy_pass http://archetype_replicas; }

        # Trusted requests + the attested WS GET upgrade.
        location / {
            proxy_pass http://archetype_replicas;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # WebSocket: the cookie pins the upgrade GET; once upgraded the
            # socket rides one TCP connection nginx never rebalances. Long
            # timeouts so an idle attested WS is not dropped mid-conversation.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
