# HAProxy cookie-affinity LB for archetype-proxy-server multi-replica.
#
# This is the PRIMARY standalone LB for the smoke harness because HAProxy's
# `cookie ... insert indirect nocache` is the textbook-correct cookie-affinity
# primitive: it GUARANTEES the cookie names a specific backend and routes by it
# (unlike a stock-nginx hash-of-cookie, which can map a cookie value to a
# different server than the one it names). Flow:
#
#   1. The handshake (POST /attest) carries NO SRVID cookie. HAProxy picks a
#      replica by `balance roundrobin` (true load-spreading across replicas)
#      and INSERTS `Set-Cookie: SRVID=<that replica's id>` on the response.
#   2. The client's cookie-store transport (task #20) echoes SRVID on every
#      follow-up trusted request and the WS GET upgrade.
#   3. HAProxy reads SRVID and routes to EXACTLY that replica -> a HIT, no
#      stickiness miss. `indirect nocache` keeps the cookie internal (stripped
#      before the backend sees it; never cached by intermediaries).

global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5s
    timeout client  3600s        # long: an idle attested WS must not be dropped
    timeout server  3600s        # long: ditto upstream side
    timeout tunnel  3600s        # WS/Upgrade tunnel lifetime once established

frontend ft_proxy
    bind *:8080
    # WebSocket detection (informational; HAProxy tunnels Upgrade automatically
    # once the connection is established and SRVID has pinned the upgrade GET).
    acl is_websocket hdr(Upgrade) -i websocket
    default_backend bk_replicas

backend bk_replicas
    balance roundrobin
    # COOKIE AFFINITY: insert SRVID naming the chosen replica on the first
    # (cookie-less) response; route by it thereafter. `indirect` => HAProxy
    # manages the cookie and strips it from the request before forwarding;
    # `nocache` => mark the response uncacheable so a proxy can't share it.
    cookie SRVID insert indirect nocache

    # Health-check ONLY ready replicas: HAProxy probes the UNAUTHENTICATED
    # /readyz (readiness). A replica failing it is removed from rotation; a
    # passing one is (re)added. /healthz (liveness) is also unauthenticated and
    # can be used by the orchestrator to restart a hung replica.
    option httpchk GET /readyz
    http-check expect status 200

    # Per-server cookie ids: the value HAProxy puts in SRVID for each replica.
    server replica1 replica1:8443 cookie r1 check
    server replica2 replica2:8443 cookie r2 check
